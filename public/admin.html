<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Norain Hair Salon</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .dashboard-container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #222; color: #fff; padding: 15px 30px; border-radius: 8px; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 24px; color: #d4af37; }
        .btn-group button { padding: 8px 16px; margin-left: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-gold { background: #d4af37; color: #fff; }
        .btn-danger { background: #EF4444; color: #fff; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-card h3 { margin: 0 0 10px 0; color: #666; font-size: 16px; }
        .stat-card p { margin: 0; font-size: 28px; font-weight: bold; color: #222; }
        
        .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .panel { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .panel h2 { margin-top: 0; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #fafafa; padding: 10px; border-radius: 6px; }
        .calendar-nav button { padding: 8px 16px; cursor: pointer; background: #222; color: #fff; border: none; border-radius: 4px; }
        
        .detail-card, .request-card { background: #fafafa; border: 1px solid #eee; padding: 15px; border-radius: 6px; margin-bottom: 15px; }
        .meta { display: flex; justify-content: space-between; color: #666; font-size: 14px; margin-bottom: 8px; }
        .confirm-btn { background: #10B981; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold; }
        
        /* Filters & Export Panel */
        .filter-controls { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; background: #f9f9f9; padding: 15px; border-radius: 6px; border: 1px solid #ddd; }
        .filter-controls label { font-size: 12px; color: #666; display: block; margin-bottom: 5px; }
        .filter-controls input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .filter-controls button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .hidden { display: none !important; }
        
        /* Modal & Toaster */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 30px; border-radius: 8px; width: 300px; }
        .modal-content input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { min-width: 300px; background-color: #222; color: #fff; padding: 16px 24px; border-radius: 8px; transform: translateX(120%); transition: transform 0.4s; display: flex; align-items: center; border-left: 5px solid #d4af37; }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>

    <div id="toast-container" class="toast-container"></div>
    <div id="notification" class="hidden">
        <span id="notification-text"></span>
        <button id="notification-action"></button>
    </div>

    <div class="dashboard-container">
        <div class="header">
            <h1>Norain Salon Portal</h1>
            <div class="btn-group">
                <button id="view-all-btn" class="btn-gold">Report & Export</button>
                <button id="change-password-btn" class="btn-gold">Change Password</button>
                <button id="logout-btn" class="btn-danger">Logout</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Pending Requests</h3>
                <p id="pending-count">0</p>
            </div>
            <div class="stat-card">
                <h3>Accepted Appointments</h3>
                <p id="accepted-count">0</p>
            </div>
            <div class="stat-card">
                <h3>Total Notifications</h3>
                <p id="request-badge">0</p>
            </div>
        </div>

        <div class="main-grid">
            
            <div class="panel">
                <div class="calendar-nav">
                    <button id="prev-day">← Previous Day</button>
                    <h2 id="current-day" style="margin: 0; border: none; padding: 0;">Today</h2>
                    <button id="next-day">Next Day →</button>
                </div>
                
                <h3 id="detail-title" style="margin-top: 0;">Loading...</h3>
                <p id="detail-subtitle" style="color: #666; margin-bottom: 5px;"></p>
                <p style="font-weight: bold; color: #d4af37;" id="day-status"></p>
                
                <div id="day-detail-list"></div>
            </div>

            <div>
                <div class="panel" style="margin-bottom: 20px;">
                    <h2>New Pending Requests</h2>
                    <div id="request-list"></div>
                </div>

                <div class="panel">
                    <h2>Today's Schedule</h2>
                    <div id="today-list"></div>
                </div>
            </div>
        </div>

        <div id="all-requests-panel" class="panel hidden" style="margin-top: 20px;">
            <h2>All Appointments & Reports</h2>
            
            <div class="filter-controls">
                <div>
                    <label>From Date</label>
                    <input type="date" id="filter-from-date">
                </div>
                <div>
                    <label>To Date</label>
                    <input type="date" id="filter-to-date">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button id="filter-btn" style="background: #222; color: #fff;">Apply Filter</button>
                    <button id="clear-filter-btn" style="background: #999; color: #fff;">Clear</button>
                    <button id="export-btn" style="background: #10B981; color: #fff;">📥 Export to Excel</button>
                </div>
            </div>
            
            <div id="all-requests-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px;"></div>
        </div>

    </div>

    <div id="password-modal" class="modal hidden">
        <div class="modal-content">
            <h2 style="margin-top: 0;">Change Password</h2>
            <form id="password-form">
                <input type="password" id="current-password" placeholder="Current Password" required>
                <input type="password" id="new-password" placeholder="New Password" required>
                <input type="password" id="confirm-password" placeholder="Confirm New Password" required>
                <p id="password-message" style="color: red; font-size: 14px; text-align: center;"></p>
                <button type="submit" class="btn-gold" style="width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 10px;">Update Password</button>
                <button type="button" id="cancel-password" style="width: 100%; padding: 10px; background: #ddd; border: none; border-radius: 4px; cursor: pointer;">Cancel</button>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
