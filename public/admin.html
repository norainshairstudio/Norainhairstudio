<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norain Salon - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #111; margin: 0; padding: 20px; color: #eee; }
        .dashboard-container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 20px 30px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333; }
        .header h1 { margin: 0; font-family: 'Playfair Display', serif; font-size: 28px; color: #d4af37; }
        .btn-group button { padding: 10px 18px; margin-left: 10px; cursor: pointer; border: none; border-radius: 6px; font-weight: 600; transition: 0.3s; }
        .btn-gold { background: #d4af37; color: #111; }
        .btn-gold:hover { background: #b5952f; }
        .btn-danger { background: transparent; color: #EF4444; border: 1px solid #EF4444; }
        .btn-danger:hover { background: #EF4444; color: #fff; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: #1a1a1a; padding: 25px; border-radius: 12px; text-align: center; border: 1px solid #333; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .stat-card h3 { margin: 0 0 10px 0; color: #aaa; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { margin: 0; font-size: 36px; font-weight: bold; color: #d4af37; font-family: 'Playfair Display', serif; }
        
        .main-grid { display: grid; grid-template-columns: 2fr 1.2fr; gap: 25px; }
        .panel { background: #1a1a1a; padding: 25px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .panel h2 { margin-top: 0; font-size: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; color: #fff; }
        
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #0a0a0a; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .calendar-nav button { padding: 8px 16px; cursor: pointer; background: transparent; color: #d4af37; border: 1px solid #d4af37; border-radius: 6px; font-weight: 500; }
        .calendar-nav button:hover { background: #d4af37; color: #111; }
        
        .detail-card, .request-card { background: #222; border: 1px solid #333; padding: 18px; border-radius: 8px; margin-bottom: 15px; transition: transform 0.2s; }
        .detail-card:hover { transform: translateY(-2px); border-color: #444; }
        .meta { display: flex; justify-content: space-between; color: #999; font-size: 13px; margin-bottom: 10px; }
        
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .confirm-btn { background: #10B981; color: #fff; border: none; padding: 10px; border-radius: 6px; cursor: pointer; flex: 1; font-weight: 600; }
        .reject-btn { background: #EF4444; color: #fff; border: none; padding: 10px; border-radius: 6px; cursor: pointer; flex: 1; font-weight: 600; }
        
        #close-day-btn { width: 100%; padding: 12px; background: #EF4444; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 15px; }
        #close-day-btn:hover { background: #dc2626; }

        .filter-controls { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; background: #0a0a0a; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        .filter-controls label { font-size: 12px; color: #999; display: block; margin-bottom: 8px; text-transform: uppercase; }
        .filter-controls input { padding: 10px; border: 1px solid #444; border-radius: 6px; background: #222; color: #fff; }
        .filter-controls input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        .filter-controls button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        
        .hidden { display: none !important; }
        
        .toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { min-width: 300px; background-color: #0a0a0a; color: #fff; padding: 16px 24px; border-radius: 8px; transform: translateX(120%); transition: transform 0.4s; display: flex; align-items: center; border: 1px solid #333; border-left: 5px solid #d4af37; }
        .toast.show { transform: translateX(0); }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 12px; width: 320px; border: 1px solid #333; }
        .modal-content input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #444; border-radius: 6px; background: #222; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="toast-container" class="toast-container"></div>

    <div class="dashboard-container">
        <div class="header">
            <h1>Norain Premium Dashboard</h1>
            <div class="btn-group">
                <button id="view-all-btn" class="btn-gold">Reports</button>
                <button id="change-password-btn" class="btn-gold">Settings</button>
                <button id="logout-btn" class="btn-danger">Logout</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Pending Actions</h3>
                <p id="pending-count">0</p>
            </div>
            <div class="stat-card">
                <h3>Confirmed Bookings</h3>
                <p id="accepted-count">0</p>
            </div>
        </div>

        <div class="main-grid">
            <div class="panel">
                <div class="calendar-nav">
                    <button id="prev-day">← Prev Day</button>
                    <h2 id="current-day" style="margin: 0; border: none; padding: 0; color: #d4af37; font-family: 'Playfair Display', serif; font-size: 24px;">Today</h2>
                    <button id="next-day">Next Day →</button>
                </div>
                
                <h3 id="detail-title" style="margin-top: 0; color: #fff;">Loading...</h3>
                <p id="detail-subtitle" style="color: #999; margin-bottom: 10px;"></p>
                <p style="font-weight: 600; color: #d4af37; font-size: 14px; letter-spacing: 1px;" id="day-status"></p>
                
                <button id="close-day-btn" class="hidden">🚨 Mark Day as Closed (Emergency Off)</button>

                <div id="day-detail-list" style="margin-top: 20px;"></div>
            </div>

            <div>
                <div class="panel" style="margin-bottom: 25px;">
                    <h2>New Requests</h2>
                    <div id="request-list"></div>
                </div>

                <div class="panel">
                    <h2>Today's Lineup</h2>
                    <div id="today-list"></div>
                </div>
            </div>
        </div>

        <div id="all-requests-panel" class="panel hidden" style="margin-top: 25px;">
            <h2>Master Ledger & Export</h2>
            <div class="filter-controls">
                <div>
                    <label>From Date</label>
                    <input type="date" id="filter-from-date">
                </div>
                <div>
                    <label>To Date</label>
                    <input type="date" id="filter-to-date">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button id="filter-btn" class="btn-gold">Filter</button>
                    <button id="clear-filter-btn" style="background: transparent; color: #999; border: 1px solid #444;">Clear</button>
                    <button id="export-btn" style="background: #10B981; color: #fff;">📥 Excel Export</button>
                </div>
            </div>
            <div id="all-requests-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;"></div>
        </div>
    </div>

    <div id="password-modal" class="modal hidden">
        <div class="modal-content">
            <h2 style="margin-top: 0; color: #fff; font-family: 'Playfair Display', serif;">Security</h2>
            <form id="password-form">
                <input type="password" id="current-password" placeholder="Current Password" required>
                <input type="password" id="new-password" placeholder="New Password" required>
                <input type="password" id="confirm-password" placeholder="Confirm Password" required>
                <p id="password-message" style="color: #EF4444; font-size: 13px; text-align: center; margin-bottom: 10px;"></p>
                <button type="submit" class="btn-gold" style="width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 10px;">Save Changes</button>
                <button type="button" id="cancel-password" style="width: 100%; padding: 12px; background: transparent; color: #999; border: 1px solid #444; border-radius: 6px; cursor: pointer;">Cancel</button>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
